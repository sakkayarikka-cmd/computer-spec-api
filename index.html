<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Computer Spec Store</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background: radial-gradient(circle at top left, #1a1a2e, #0f0f0f 60%);
  color:white;
  transition:0.3s;
  min-height:100vh;
}

body.light{
  background: linear-gradient(135deg,#f5f7fa,#e4ecf5);
  color:#222;
}

/* ===== HEADER ===== */
header{
  padding:25px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  backdrop-filter: blur(8px);
}

header h1{
  font-size:28px;
  letter-spacing:1px;
}

/* ===== CONTAINER ===== */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  padding:20px 30px 40px 30px;
}

/* ===== CARD ===== */
.card{
  background:rgba(30,30,30,0.85);
  padding:20px;
  border-radius:16px;
  transition:transform 0.25s ease, box-shadow 0.25s ease;
  transform:translateY(20px);
  opacity:0;
  animation:fadeUp 0.5s forwards;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
  border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 18px 35px rgba(0,0,0,0.45);
}

body.light .card{
  background:white;
  border:1px solid #eee;
}

/* ===== PRICE ===== */
.price{
  color:#00ff88;
  font-weight:bold;
  font-size:18px;
  margin-top:10px;
}

/* ===== INPUTS ===== */
input, select{
  padding:10px 12px;
  margin:5px;
  border-radius:10px;
  border:none;
  background:#1e1e1e;
  color:white;
  outline:none;
  transition:0.2s;
}

input:focus, select:focus{
  box-shadow:0 0 0 2px #00ff88;
}

body.light input,
body.light select{
  background:white;
  color:#222;
  border:1px solid #ddd;
}

/* ===== BUTTON ===== */
button{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#00ff88;
  color:#111;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  opacity:0.85;
}

/* ===== ANIMATION ===== */
@keyframes fadeUp{
  to{
    transform:translateY(0);
    opacity:1;
  }
}
</style>
</head>

<body>

<header>
  <h1>💻 Computer Spec Store</h1>
  <button onclick="toggleTheme()">🌗 Toggle</button>
</header>

<div style="padding:0 30px;">
  <input type="text" id="searchName" placeholder="ค้นหาชื่อ / CPU">
  <input type="number" id="searchPrice" placeholder="งบสูงสุด">
  <select id="filterType">
    <option value="">ทุกประเภท</option>
    <option value="gaming">Gaming</option>
    <option value="office">Office</option>
  </select>
</div>

<div class="container" id="cardContainer"></div>

<script>
const container = document.getElementById("cardContainer");
const nameInput = document.getElementById("searchName");
const priceInput = document.getElementById("searchPrice");
const typeInput = document.getElementById("filterType");

let computers = [];

async function fetchData(){
  const res = await fetch("/api/spec");
  const json = await res.json();
  computers = json.data;
  renderCards(computers);
}

function renderCards(data){
  container.innerHTML = "";
  data.forEach((pc,i)=>{
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = i * 0.05 + "s";

    card.innerHTML = `
      <h3>${pc.name}</h3>
      <p><b>CPU:</b> ${pc.cpu}</p>
      <p><b>GPU:</b> ${pc.gpu}</p>
      <p><b>RAM:</b> ${pc.ram}</p>
      <p><b>Storage:</b> ${pc.storage}</p>
      <p class="price">฿ ${pc.price.toLocaleString()}</p>
    `;

    container.appendChild(card);
  });
}

function filterCards(){
  const nameValue = nameInput.value.toLowerCase();
  const priceValue = parseInt(priceInput.value);
  const typeValue = typeInput.value;

  let filtered = computers.filter(pc=>{
    const matchName =
      pc.name.toLowerCase().includes(nameValue) ||
      pc.cpu.toLowerCase().includes(nameValue);

    const matchPrice =
      !priceValue || pc.price <= priceValue;

    const matchType =
      !typeValue || pc.type === typeValue;

    return matchName && matchPrice && matchType;
  });

  renderCards(filtered);
}

nameInput.addEventListener("input", filterCards);
priceInput.addEventListener("input", filterCards);
typeInput.addEventListener("change", filterCards);

function toggleTheme(){
  document.body.classList.toggle("light");
}

fetchData();
</script>

</body>
</html>
