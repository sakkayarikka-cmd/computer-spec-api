<!DOCTYPE html>
<html>
<head>
  <title>Smart Computer Spec AI</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color: white;
      text-align: center;
      padding: 40px;
    }

    input {
      padding: 8px;
      margin: 5px;
    }

    button {
      padding: 8px 15px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #00e5ff;
      font-weight: bold;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: white;
      color: black;
      width: 250px;
      padding: 15px;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
    }

    #modalContent {
      background: white;
      color: black;
      width: 400px;
      margin: 100px auto;
      padding: 20px;
      border-radius: 15px;
    }
  </style>
</head>
<body>

<h1>🤖 Smart Computer Spec System</h1>

<!-- LOGIN -->
<h2>Login</h2>
<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>

<hr>

<!-- โหลดเครื่อง -->
<button onclick="loadComputers()">Load Computers</button>

<div class="container" id="result"></div>

<hr>

<!-- งบประมาณ -->
<h2>Budget Recommendation</h2>
<input id="budgetInput" placeholder="เช่น 30000">
<button onclick="recommendBudget()">แนะนำตามงบ</button>

<!-- Modal -->
<div id="modal">
  <div id="modalContent">
    <div id="detail"></div>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

let allComputers = [];

async function loadComputers(){
  const res = await fetch('/api/spec');
  const data = await res.json();

  allComputers = data;

  const container = document.getElementById('result');
  container.innerHTML = '';

  data.forEach(pc => {
    container.innerHTML += `
      <div class="card" onclick="showDetail('${pc._id}')">
        <h3>${pc.name}</h3>
        <p>${pc.cpu}</p>
        <p><b>ราคา:</b> ${pc.price} บาท</p>
      </div>
    `;
  });
}

function showDetail(id){
  const pc = allComputers.find(x => x._id === id);

  document.getElementById('detail').innerHTML = `
    <h2>${pc.name}</h2>
    <p><b>CPU:</b> ${pc.cpu}</p>
    <p><b>RAM:</b> ${pc.ram}</p>
    <p><b>Storage:</b> ${pc.storage}</p>
    <p><b>GPU:</b> ${pc.gpu}</p>
    <p><b>OS:</b> ${pc.os}</p>
    <p><b>ราคา:</b> ${pc.price} บาท</p>
  `;

  document.getElementById('modal').style.display = 'block';
}

function closeModal(){
  document.getElementById('modal').style.display = 'none';
}

async function recommendBudget(){
  const budget = document.getElementById("budgetInput").value;
  const res = await fetch('/api/spec?budget=' + budget);
  const data = await res.json();

  if(data.length > 0){
    showDetail(data[0]._id);
  } else {
    alert("ไม่พบเครื่องในงบนี้");
  }
}

async function login(){
  const username = document.getElementById("user").value;
  const password = document.getElementById("pass").value;

  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();
  alert(data.message);
}

</script>

</body>
</html>
