<!DOCTYPE html>
<html>
<head>
  <title>Smart Computer Spec AI</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color: white;
      text-align: center;
      margin: 0;
      padding: 40px;
    }

    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #00e5ff;
      font-weight: bold;
    }

    .container {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: white;
      color: black;
      width: 250px;
      padding: 15px;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
    }

    #modalContent {
      background: white;
      color: black;
      width: 400px;
      margin: 100px auto;
      padding: 20px;
      border-radius: 15px;
    }

    input {
      padding: 8px;
      width: 200px;
    }
  </style>
</head>
<body>

<h1>🤖 Smart Computer Spec AI</h1>

<button onclick="loadComputers()">Load Computers</button>

<h2>AI Recommend</h2>
<input id="useInput" placeholder="เช่น gaming, office, coding">
<button onclick="recommend()">แนะนำสเปค</button>

<div class="container" id="result"></div>

<div id="modal">
  <div id="modalContent">
    <div id="detail"></div>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

async function loadComputers(){
  const res = await fetch('/api/spec');
  const data = await res.json();

  const container = document.getElementById('result');
  container.innerHTML = '';

  data.forEach(pc => {
    container.innerHTML += `
      <div class="card" onclick="showDetail(${pc.id})">
        <h3>${pc.name}</h3>
        <p>${pc.cpu}</p>
        <p>${pc.ram}</p>
      </div>
    `;
  });

  window.allComputers = data;
}

function showDetail(id){
  const pc = window.allComputers.find(x => x.id === id);

  document.getElementById('detail').innerHTML = `
    <h2>${pc.name}</h2>
    <p><b>CPU:</b> ${pc.cpu}</p>
    <p><b>RAM:</b> ${pc.ram}</p>
    <p><b>Storage:</b> ${pc.storage}</p>
    <p><b>GPU:</b> ${pc.gpu}</p>
    <p><b>OS:</b> ${pc.os}</p>
  `;

  document.getElementById('modal').style.display = 'block';
}

function closeModal(){
  document.getElementById('modal').style.display = 'none';
}

async function recommend(){
  const use = document.getElementById('useInput').value;

  const res = await fetch('/api/spec?use=' + use);
  const data = await res.json();

  if(data.recommendation){
    showDetail(data.recommendation.id);
  }else{
    alert("ไม่พบคำแนะนำ");
  }
}

</script>

</body>
</html>
