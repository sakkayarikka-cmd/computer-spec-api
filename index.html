<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Computer Spec Store</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  transition:0.3s;
}

body.light{
  background:#f5f5f5;
  color:#222;
}

header{
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#1e1e1e;
  padding:20px;
  border-radius:12px;
  transition:transform 0.25s ease, box-shadow 0.25s ease;
  transform:translateY(20px);
  opacity:0;
  animation:fadeUp 0.5s forwards;
  box-shadow:0 5px 15px rgba(0,0,0,0.25);
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 15px 30px rgba(0,0,0,0.45);
}

body.light .card{
  background:white;
}

.card:hover{
  transform:scale(1.05);
}

.price{
  color:#00ff88;
  font-weight:bold;
}

input, select{
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

@keyframes fadeUp{
  to{
    transform:translateY(0);
    opacity:1;
  }
}
</style>
</head>
<body>

<header>
  <h1>💻 Computer Spec Store</h1>
  <button onclick="toggleTheme()">🌗 Toggle</button>
</header>

<div style="padding:20px;">
  <input type="text" id="searchName" placeholder="ค้นหาชื่อ / CPU">
  <input type="number" id="searchPrice" placeholder="งบสูงสุด">
  <select id="filterType">
    <option value="">ทุกประเภท</option>
    <option value="gaming">Gaming</option>
    <option value="office">Office</option>
  </select>
</div>

<div class="container" id="cardContainer"></div>

<script>
const container = document.getElementById("cardContainer");
const nameInput = document.getElementById("searchName");
const priceInput = document.getElementById("searchPrice");
const typeInput = document.getElementById("filterType");

let computers = [];

async function fetchData(){
  const res = await fetch("/api/spec");
  const json = await res.json();
  computers = json.data;
  renderCards(computers);
}

function renderCards(data){
  container.innerHTML = "";
  data.forEach((pc,i)=>{
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = i * 0.05 + "s";

    card.innerHTML = `
      <h3>${pc.name}</h3>
      <p><b>CPU:</b> ${pc.cpu}</p>
      <p><b>GPU:</b> ${pc.gpu}</p>
      <p><b>RAM:</b> ${pc.ram}</p>
      <p><b>Storage:</b> ${pc.storage}</p>
      <p class="price">฿ ${pc.price.toLocaleString()}</p>
    `;

    container.appendChild(card);
  });
}

function filterCards(){
  const nameValue = nameInput.value.toLowerCase();
  const priceValue = parseInt(priceInput.value);
  const typeValue = typeInput.value;

  let filtered = computers.filter(pc=>{
    const matchName =
      pc.name.toLowerCase().includes(nameValue) ||
      pc.cpu.toLowerCase().includes(nameValue);

    const matchPrice =
      !priceValue || pc.price <= priceValue;

    const matchType =
      !typeValue || pc.type === typeValue;

    return matchName && matchPrice && matchType;
  });

  renderCards(filtered);
}

nameInput.addEventListener("input", filterCards);
priceInput.addEventListener("input", filterCards);
typeInput.addEventListener("change", filterCards);

function toggleTheme(){
  document.body.classList.toggle("light");
}

fetchData();
</script>

</body>
</html>
