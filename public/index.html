<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Computer Spec</title>

<style>
:root {
  --bg: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  --card: #1c1c1c;
  --text: #fff;
  --accent: #00ffc3;
}

.light {
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #111;
  --accent: #0077ff;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.4s ease;
}

header {
  text-align: center;
  padding: 40px 20px 20px;
}

h1 {
  margin-bottom: 10px;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin: 20px 0;
}

input, select, button {
  padding: 10px 15px;
  border-radius: 30px;
  border: none;
  outline: none;
}

button {
  background: var(--accent);
  cursor: pointer;
  font-weight: bold;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 25px;
  padding: 20px;
  max-width: 1200px;
  margin: auto;
}

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  transition: 0.3s ease;
  transform: translateY(20px);
  opacity: 0;
}

.card.show {
  transform: translateY(0);
  opacity: 1;
}

.card:hover {
  transform: translateY(-5px);
}

.badge {
  font-size: 12px;
  margin-bottom: 5px;
}

.price {
  color: var(--accent);
  font-size: 18px;
  font-weight: bold;
}

.toggle {
  position: fixed;
  top: 20px;
  right: 20px;
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleMode()">🌙 / ☀️</button>

<header>
  <h1>🤖 Smart Computer Spec System</h1>
  <p>ระบบค้นหาและแนะนำสเปคคอมพิวเตอร์</p>

  <div class="controls">
    <input type="text" id="search" placeholder="ค้นหา CPU / GPU / ชื่อ..." />
    <input type="number" id="budget" placeholder="ใส่งบประมาณ (บาท)" />
    <select id="sort">
      <option value="">เรียงราคา</option>
      <option value="low">ราคาต่ำ → สูง</option>
      <option value="high">ราคาสูง → ต่ำ</option>
    </select>
    <button onclick="applyFilter()">ค้นหา</button>
  </div>
</header>

<div class="grid" id="computerList"></div>

<script>
let computers = [];

async function fetchData() {
  const res = await fetch("/api/spec");
  computers = await res.json();
  render(computers);
}

function render(data) {
  const container = document.getElementById("computerList");
  container.innerHTML = "";

  data.forEach((pc, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="badge">${pc.badge || ""}</div>
      <h3>${pc.name}</h3>
      <p>${pc.cpu}</p>
      <p>${pc.gpu}</p>
      <p>${pc.ram} | ${pc.storage}</p>
      <p>${pc.os}</p>
      <div class="price">${pc.price.toLocaleString()} บาท</div>
    `;

    container.appendChild(card);

    setTimeout(() => {
      card.classList.add("show");
    }, index * 80);
  });
}

function applyFilter() {
  let filtered = [...computers];

  const keyword = document.getElementById("search").value.toLowerCase();
  const budget = document.getElementById("budget").value;
  const sort = document.getElementById("sort").value;

  if (keyword) {
    filtered = filtered.filter(pc =>
      pc.name.toLowerCase().includes(keyword) ||
      pc.cpu.toLowerCase().includes(keyword) ||
      pc.gpu.toLowerCase().includes(keyword)
    );
  }

  if (budget) {
    filtered = filtered
      .filter(pc => pc.price <= budget)
      .sort((a, b) => b.price - a.price)
      .slice(0, 3);
  }

  if (sort === "low") {
    filtered.sort((a, b) => a.price - b.price);
  }
  if (sort === "high") {
    filtered.sort((a, b) => b.price - a.price);
  }

  render(filtered);
}

function toggleMode() {
  document.body.classList.toggle("light");
}

fetchData();
</script>

</body>
</html>
